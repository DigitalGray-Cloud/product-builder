<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Teller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Enter Your Birth Year</h1>
        <p>Discover your destiny</p>

            <input type="number" id="birth-year-input" placeholder="e.g., 1990">
            <button id="fortune-button">Reveal My Fortune</button>
        </div>
        <div id="card-container"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
