<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운동 마스터 - Workout Master</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="auth-screen" class="auth-screen">
        <div class="auth-card">
            <h1>🏋️ 운동 마스터</h1>
            <p>구글 계정으로 1초 로그인하고, 모든 기기에서 기록을 동기화하세요.</p>
            <button id="google-login-btn" class="auth-btn">Google로 원클릭 로그인</button>
            <p id="auth-status" class="auth-status">로그인이 필요합니다.</p>
        </div>
    </div>

    <div id="app" hidden>
        <header>
            <h1>🏋️ 운동 마스터</h1>
            <p id="current-date"></p>
            <div class="user-bar">
                <span id="user-email"></span>
                <button id="logout-btn" class="outline-btn">로그아웃</button>
            </div>
        </header>

        <section class="input-section">
            <div class="voice-btn-container">
                <button id="voice-btn" class="glow-btn">
                    <i class="fas fa-microphone"></i>
                </button>
                <span id="voice-status">버튼을 눌러 말하기</span>
            </div>

            <div class="text-input-container">
                <input type="text" id="exercise-input" placeholder="예: 벤치프레스 80kg 8회 5세트">
                <button id="add-btn">기록</button>
            </div>
        </section>

        <section class="history-section">
            <div class="section-header">
                <h2>오늘의 운동 기록</h2>
                <button id="report-btn" class="outline-btn">📊 월별 리포트</button>
            </div>
            <div id="workout-list" class="workout-grid">
                <!-- 운동 카드들이 여기에 렌더링됩니다 -->
            </div>
        </section>

        <!-- 월별 리포트 모달 -->
        <div id="report-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="report-view">
                    <!-- 리포트 내용이 여기에 렌더링됩니다 -->
                </div>
                <div class="email-section">
                    <input type="email" id="email-input" placeholder="이메일 주소">
                    <button id="send-email-btn">리포트 전송</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 프로필 모달 (스킵 가능) -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h3>기본 인적사항 (선택)</h3>
            <p class="helper-text">오늘은 스킵하고 내일 다시 설정할 수 있습니다.</p>
            <div class="profile-form">
                <input id="profile-name" type="text" placeholder="이름">
                <input id="profile-age" type="number" placeholder="나이">
                <input id="profile-height" type="number" placeholder="키(cm)">
                <input id="profile-weight" type="number" placeholder="체중(kg)">
            </div>
            <div class="confirm-actions">
                <button id="save-profile-btn" class="action-btn yes">저장</button>
                <button id="skip-profile-btn" class="action-btn no">내일 설정할게요</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
