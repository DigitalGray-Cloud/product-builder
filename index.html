<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Teller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="language-toggle">
            <button id="lang-en" class="active">EN</button>
            <button id="lang-ko">KO</button>
        </div>
        <h1 id="title">Fortune Teller</h1>
        <p id="subtitle">Discover your destiny</p>
        <div class="input-container">
            <input type="number" id="birth-year-input" placeholder="e.g., 1990">
            <button id="fortune-button">Reveal My Fortune</button>
        </div>
        <div id="card-container"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
